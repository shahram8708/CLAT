<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Career Launcher Ahmedabad{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Career Launcher Ahmedabad is Ahmedabad's trusted coaching institute for CAT, CLAT, IPMAT, GMAT, CUET and Class XI to XII Mathematics.{% endblock %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "Career Launcher Ahmedabad",
    "url": "https://careerlauncherahmedabad.com",
    "telephone": "+91-9978559986",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "A 102, Karmyog Heights, Navrangpura",
      "addressLocality": "Ahmedabad",
      "addressRegion": "Gujarat",
      "postalCode": "380009",
      "addressCountry": "IN"
    },
    "openingHours": ["Mo-Sa 10:00-19:00", "Su 09:00-18:00"],
    "sameAs": ["https://www.careerlauncher.com/ahmedabad"]
  }
  </script>
</head>
<body>
  {% include 'components/_navbar.html' %}
  {% include 'components/_flash_messages.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'components/_footer.html' %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/counter.js') }}"></script>
  <script src="{{ url_for('static', filename='js/filters.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/modal.js') }}" defer></script>
  {% block extra_js %}{% endblock %}

  {% include 'components/_demo_modal.html' %}
</body>
</html>
