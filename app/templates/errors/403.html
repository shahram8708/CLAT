{% extends 'base.html' %}

{% block title %}403 | Access Denied{% endblock %}
{% block content %}
<section class="section-space" style="min-height: 65vh; display: flex; align-items: center;">
  <div class="container text-center">
    <h1 style="font-size: clamp(60px, 10vw, 120px); color: var(--cl-red); font-weight: 800;">403</h1>
    <h2 class="section-title">Access Denied</h2>
    <p class="text-muted mb-4">You do not have permission to access this page. Please login with the correct account or return to the homepage.</p>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
      <a href="/login" class="btn btn-cl-primary">Go to Login</a>
      <a href="{{ url_for('main.index') }}" class="btn btn-outline-dark rounded-pill">Back to Homepage</a>
    </div>
  </div>
</section>
{% endblock %}
